<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Team | Everything Essential</title>
<meta name="description" content="The cofounders of Everything Essential — Min Park and Daniel Chen. How they met, what they believe, what they're building." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Cofounders page — local styles */
  .cf-portrait {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 5;
    background: var(--bg-soft);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    overflow: hidden;
  }
  .cf-portrait::before {
    content: "";
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      135deg,
      color-mix(in oklch, var(--ink) 4%, transparent) 0,
      color-mix(in oklch, var(--ink) 4%, transparent) 2px,
      transparent 2px,
      transparent 14px
    );
  }
  .cf-portrait::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 35%, color-mix(in oklch, var(--accent) 12%, transparent), transparent 60%);
  }
  .cf-portrait .placeholder-label {
    position: absolute;
    left: 16px; bottom: 14px;
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.04em;
    color: var(--ink-mute);
    background: color-mix(in oklch, var(--bg-elev) 88%, transparent);
    padding: 4px 8px; border-radius: 6px;
    border: 1px solid var(--hairline);
    z-index: 1;
  }
  .cf-portrait .corner-mark {
    position: absolute;
    right: 14px; top: 14px;
    font-family: var(--mono);
    font-size: 10.5px; letter-spacing: 0.06em;
    color: var(--ink-mute);
    text-transform: uppercase;
    z-index: 1;
  }
  .cf-portrait .initial {
    position: absolute;
    inset: 0;
    display: grid; place-items: center;
    font-family: var(--serif);
    font-size: clamp(72px, 11vw, 132px);
    letter-spacing: -0.04em;
    color: color-mix(in oklch, var(--ink) 14%, transparent);
    z-index: 1;
    font-weight: 300;
  }

  .cf-meta-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    padding: 18px 0;
    border-top: 1px solid var(--hairline);
    align-items: baseline;
    gap: 24px;
  }
  .cf-meta-row:last-child { border-bottom: 1px solid var(--hairline); }
  .cf-meta-row .k {
    font-family: var(--sans);
    font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .cf-meta-row .v { font-size: 15px; color: var(--ink); line-height: 1.55; }

  .founder-block {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 64px;
    align-items: start;
  }
  .founder-block--reverse { grid-template-columns: 1fr 360px; }
  @media (max-width: 960px) {
    .founder-block,
    .founder-block--reverse { grid-template-columns: 1fr; gap: 32px; }
    .founder-block .cf-portrait { max-width: 360px; }
    .founder-block > div { order: 0 !important; }
  }

  .founder-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--hairline-strong), transparent);
    margin: clamp(72px, 9vw, 120px) 0;
  }

  .timeline {
    position: relative;
  }
  .timeline-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 32px;
    padding: 32px 0;
    border-top: 1px solid var(--hairline);
    align-items: start;
  }
  .timeline-row:last-child { border-bottom: 1px solid var(--hairline); }
  .timeline-row .yr {
    font-family: var(--serif);
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .timeline-row .when {
    font-family: var(--mono);
    font-size: 11.5px; letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-top: 6px;
  }
  .timeline-row .body p {
    color: var(--ink-soft);
    font-size: 16px; line-height: 1.65;
    max-width: 640px;
  }
  .timeline-row .body .head {
    font-family: var(--serif);
    font-size: 22px; letter-spacing: -0.015em;
    color: var(--ink);
    margin-bottom: 8px;
  }
  @media (max-width: 760px) {
    .timeline-row { grid-template-columns: 1fr; gap: 8px; }
  }

  .pull-quote {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(26px, 3.4vw, 40px);
    line-height: 1.25;
    letter-spacing: -0.015em;
    color: var(--ink);
    max-width: 880px;
    text-wrap: balance;
  }
  .pull-quote::before {
    content: "“";
    display: block;
    font-family: var(--serif);
    font-size: 80px;
    color: var(--accent);
    line-height: 0.6;
    margin-bottom: 16px;
  }
  .pull-quote .attrib {
    display: block;
    font-style: normal;
    font-family: var(--sans);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-top: 28px;
  }

  .principle-card {
    padding: 32px;
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    background: var(--bg-elev);
    display: flex; flex-direction: column; gap: 14px;
  }
  .principle-card .num {
    font-family: var(--mono);
    font-size: 11.5px; letter-spacing: 0.08em;
    color: var(--accent);
  }
  .principle-card .ttl {
    font-family: var(--serif);
    font-size: 22px;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .principle-card .desc {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
  }

  .meet-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    overflow: hidden;
    background: var(--bg-elev);
  }
  .meet-grid > div { padding: 36px; }
  .meet-grid > div + div { border-left: 1px solid var(--hairline); }
  .meet-grid .who {
    font-family: var(--mono);
    font-size: 11.5px; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 16px;
  }
  .meet-grid p {
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink-soft);
  }
  .meet-grid p + p { margin-top: 14px; }
  @media (max-width: 1000px) {
    .meet-grid { grid-template-columns: 1fr; }
    .meet-grid > div + div { border-left: 0; border-top: 1px solid var(--hairline); }
  }
  @media (max-width: 760px) {
    .meet-grid > div { padding: 28px; }
  }

  .cf-cta-card {
    background: var(--ink);
    color: white;
    border-radius: var(--r-xl);
    padding: clamp(40px, 6vw, 72px);
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 48px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .cf-cta-card h2 { color: white; }
  .cf-cta-card .grain { opacity: 0.2; }
  @media (max-width: 760px) {
    .cf-cta-card { grid-template-columns: 1fr; }
  }

  .role-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 6px 12px;
    border: 1px solid color-mix(in oklch, var(--accent) 35%, transparent);
    border-radius: 999px;
    background: color-mix(in oklch, var(--accent) 8%, transparent);
  }

  .founder-name {
    font-family: var(--serif);
    font-size: clamp(40px, 5.4vw, 64px);
    letter-spacing: -0.025em;
    line-height: 1.02;
    color: var(--ink);
    margin: 18px 0 10px;
  }
  .founder-sub {
    color: var(--ink-soft);
    font-size: 18px;
    line-height: 1.55;
    max-width: 540px;
  }
  .founder-bio {
    margin-top: 32px;
    color: var(--ink-soft);
    font-size: 16.5px;
    line-height: 1.7;
  }
  .founder-bio p + p { margin-top: 14px; }
  .founder-bio strong { color: var(--ink); font-weight: 500; }

  .links-row {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 28px;
  }
  .link-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px;
    border-radius: 999px;
    border: 1px solid var(--hairline-strong);
    background: var(--bg-elev);
    color: var(--ink);
    font-size: 13.5px;
    transition: border-color .18s, color .18s;
  }
  .link-chip:hover { border-color: var(--ink-mute); }
  .link-chip svg { color: var(--ink-mute); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="cofounders.jsx"></script>
</body>
</html>
