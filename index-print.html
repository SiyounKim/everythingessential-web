<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Everything Essential | Intelligent Systems for Daily Life</title>
<meta name="description" content="Everything Essential builds intelligent systems that help people manage food, budgeting, and dietary safety with confidence, starting with Friddy, an AI-powered Kitchen OS." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Print optimizations */
  @page { size: A4 portrait; margin: 14mm; }

  html, body { background: white !important; }

  /* Hide interactive UI in print */
  om-tweaks-launcher, .tweaks-panel, [class*="tweaks"] { display: none !important; }

  /* Force colors to print */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  @media print {
    .nav { position: static !important; backdrop-filter: none !important; background: white !important; border-bottom: 1px solid #ddd !important; }
    .section, .section--tight { padding: 32px 0 !important; }
    .section--ink { background: #1a2030 !important; }
    .footer { padding: 36px 0 24px !important; }

    /* Page breaks between major sections */
    section { break-inside: avoid; }
    section + section { break-before: auto; }

    /* Avoid awkward splits */
    .card, h1, h2, h3, .sec-head { break-inside: avoid; page-break-inside: avoid; }

    /* No animations */
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }

    /* Force fade-up visible */
    .fade-up { opacity: 1 !important; transform: none !important; }
    .rise { animation: none !important; opacity: 1 !important; transform: none !important; }

    /* Hero: shrink to fit a page */
    .halo { display: none !important; }

    /* Avoid hover/sticky weirdness */
    [style*="position: sticky"], [style*="position:sticky"] { position: static !important; }

    /* Ensure dark sections render their colors */
    .section--ink, .section--ink * { color: white !important; }
    .section--ink h2, .section--ink h3 { color: white !important; }
    .footer, .footer * { color: #d8dde6 !important; }
    .footer h4, .footer .footer-brand { color: white !important; }

    /* Compress phone mockup so it fits */
    .phone { transform: scale(0.78) !important; transform-origin: center top !important; }

    /* Keep card grids together */
    .card { box-shadow: none !important; border: 1px solid #e0e3ea !important; }
  }

  /* Even outside print, simplify a bit so the printable preview is clean */
  body { background: white; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home.jsx"></script>

<script type="text/babel">
  // Wait for fonts + React render + a safety delay, then trigger print.
  (async () => {
    try {
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
    } catch (e) {}
    // Wait for React app to mount
    const waitForRoot = () => new Promise(res => {
      const check = () => {
        const root = document.getElementById("root");
        if (root && root.children.length > 0) res();
        else setTimeout(check, 50);
      };
      check();
    });
    await waitForRoot();
    // Wait for fade-ups to settle and any layout async work
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>
</body>
</html>
